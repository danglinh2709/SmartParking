<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Quên mật khẩu – Smart Parking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Reuse verify.css for consistent beautiful UI -->
    <link rel="stylesheet" href="../login/verify.css" />
    <style>
      .step { display: none; }
      .step.active { display: block; }
      .pwd-field { position: relative; margin-bottom: 18px; text-align: left; }
      .pwd-field label { display: block; font-size: 14px; margin-bottom: 8px; color: #374151; }
      .pwd-field input { 
        width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 16px;
      }
      .pwd-field input:focus { outline: none; border-color: #2563eb; }
    </style>
  </head>
  <body>
    <div class="verify-container">
      <div class="verify-card">
        <div class="icon">🔑</div>
        <h2 id="pageTitle">Quên mật khẩu</h2>
        <p class="desc" id="pageDesc">Nhập email để nhận mã OTP khôi phục mật khẩu.</p>

        <!-- Step 1: Nhập Email -->
        <form id="emailForm" class="step active">
          <div class="email-box" style="text-align: left;">
            <label style="display: block; font-size: 14px; margin-bottom: 8px;">Email đã đăng ký</label>
            <input id="email" type="email" placeholder="example@gmail.com" required 
              style="width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 16px;" />
          </div>
          <button type="submit"><span>Gửi mã OTP</span></button>
          <p class="resend"><a href="dangnhap.html">Quay lại đăng nhập</a></p>
        </form>

        <!-- Step 2: Nhập OTP -->
        <form id="otpForm" class="step">
          <div class="email-box">
            <span>Mã OTP đã gửi đến</span>
            <strong id="displayEmail"></strong>
          </div>
          <input id="otp" maxlength="6" placeholder="••••••" inputmode="numeric" required />
          <button type="submit"><span>Xác thực OTP</span></button>
          <p class="resend">Không nhận được mã? <a href="#" id="resendBtn">Gửi lại</a></p>
        </form>

        <!-- Step 3: Nhập Mật khẩu mới -->
        <form id="pwdForm" class="step">
          <div class="pwd-field">
            <label>Mật khẩu mới</label>
            <input id="newPassword" type="password" required placeholder="Nhập mật khẩu mới" />
          </div>
          <div class="pwd-field">
            <label>Nhập lại mật khẩu mới</label>
            <input id="confirmPassword" type="password" required placeholder="Xác nhận mật khẩu" />
          </div>
          <button type="submit"><span>Cập nhật mật khẩu</span></button>
        </form>

        <div id="msg"></div>
      </div>
    </div>

    <script>
      const msgDiv = document.getElementById('msg');
      const emailForm = document.getElementById('emailForm');
      const otpForm = document.getElementById('otpForm');
      const pwdForm = document.getElementById('pwdForm');
      const pageTitle = document.getElementById('pageTitle');
      const pageDesc = document.getElementById('pageDesc');
      const displayEmail = document.getElementById('displayEmail');

      let currentEmail = '';
      let currentOtp = '';

      function showMsg(text, isError = true) {
        msgDiv.innerText = text;
        msgDiv.style.color = isError ? '#ef4444' : '#10b981';
      }

      function switchStep(stepId) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(stepId).classList.add('active');
        msgDiv.innerText = '';
      }

      // Step 1 Submit
      emailForm.onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        try {
          const res = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.msg);

          currentEmail = email;
          displayEmail.innerText = email;
          pageTitle.innerText = "Xác nhận OTP";
          pageDesc.innerText = "Vui lòng nhập mã 6 số được gửi trong email của bạn.";
          switchStep('otpForm');
        } catch (err) {
          showMsg(err.message);
        }
      };

      // Step 2 Submit
      otpForm.onsubmit = async (e) => {
        e.preventDefault();
        const otp = document.getElementById('otp').value;
        try {
          const res = await fetch('/api/auth/verify-reset-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: currentEmail, otp })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.msg);

          currentOtp = otp;
          pageTitle.innerText = "Mật khẩu mới";
          pageDesc.innerText = "Hãy thiết lập mật khẩu mới cho tài khoản của bạn.";
          switchStep('pwdForm');
        } catch (err) {
          showMsg(err.message);
        }
      };

      // Step 3 Submit
      pwdForm.onsubmit = async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (newPassword !== confirmPassword) {
          return showMsg("Mật khẩu xác nhận không khớp");
        }

        try {
          const res = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: currentEmail, otp: currentOtp, newPassword })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.msg);

          showMsg(data.msg, false);
          setTimeout(() => location.href = 'dangnhap.html', 2000);
        } catch (err) {
          showMsg(err.message);
        }
      };

      document.getElementById('resendBtn').onclick = (e) => {
        e.preventDefault();
        emailForm.requestSubmit();
        showMsg("Đã yêu cầu gửi lại mã", false);
      };
    </script>
  </body>
</html>
